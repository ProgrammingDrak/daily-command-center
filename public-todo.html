<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Shared Todo List</title>
  <link rel="stylesheet" href="/public/css/dashboard.css">
</head>
<body class="todo-public-body guest-mode">
  <main class="todo-public-shell">
    <section class="todo-public-hero">
      <div>
        <h1 id="todo-public-title">Shared Todo List</h1>
        <p id="todo-public-subtitle">A live view of today's active list.</p>
      </div>
      <div class="todo-public-actions">
        <a class="todo-public-login" href="/login">Sign in</a>
        <a class="todo-public-login primary" href="/register">Create account</a>
      </div>
    </section>

    <section id="todo-public-error" class="todo-public-error" hidden></section>

    <section id="todo-public-content" class="todo-public-grid" hidden>
      <section class="todo-public-main">
        <div class="todo-public-toolbar">
          <div>
            <strong id="todo-public-date">Today</strong>
            <span id="todo-public-updated">Live</span>
          </div>
          <div class="todo-public-stats">
            <span><b id="todo-stat-open">0</b> open</span>
            <span><b id="todo-stat-done">0</b> done</span>
            <span><b id="todo-stat-sponsored">0</b> sponsored</span>
          </div>
        </div>
        <div class="todo-public-controls" aria-label="Feed controls">
          <div class="todo-public-multiselect" id="todo-type-filter">
            <span class="todo-public-control-label">Show</span>
            <button id="todo-filter-type-button" class="todo-filter-menu-button" type="button" aria-haspopup="true" aria-expanded="false">Tasks, Repeat</button>
            <div id="todo-filter-type-menu" class="todo-filter-menu" hidden>
              <label><input type="checkbox" data-type-filter="task" checked> Tasks</label>
              <label><input type="checkbox" data-type-filter="repeat" checked> Repeat</label>
              <label><input type="checkbox" data-type-filter="calendar"> Calendar</label>
              <label><input type="checkbox" data-type-filter="time"> Breaks / OOO</label>
            </div>
          </div>
          <label>Status
            <select id="todo-filter-status">
              <option value="all">All statuses</option>
              <option value="open">Open</option>
              <option value="done">Done</option>
              <option value="sponsored">Sponsored</option>
            </select>
          </label>
          <label>Calendar
            <select id="todo-filter-calendar">
              <option value="all">All calendars</option>
            </select>
          </label>
          <label>Sort
            <select id="todo-sort">
              <option value="time">Time</option>
              <option value="type">Type</option>
              <option value="status">Status</option>
              <option value="title">Title</option>
              <option value="duration">Duration</option>
            </select>
          </label>
        </div>

        <!-- Inline guest task creation. Reuses the same fields the sidebar used so
             submitCreateTask() is unchanged; guest-created tasks come back marked
             createdByGuest and render with a distinct border. -->
        <div class="todo-guest-add">
          <button id="todo-guest-add-toggle" class="todo-guest-add-toggle" type="button" aria-expanded="false">+ Add a task</button>
          <div id="todo-guest-add-form" class="todo-guest-add-form" hidden>
            <input id="todo-create-title" type="text" maxlength="220" placeholder="What needs doing?">
            <div class="todo-guest-add-row">
              <input id="todo-create-name" type="text" maxlength="80" placeholder="Your name">
              <select id="todo-create-duration" aria-label="Duration">
                <option value="15">15m</option>
                <option value="30" selected>30m</option>
                <option value="45">45m</option>
                <option value="60">1h</option>
                <option value="90">1.5h</option>
                <option value="120">2h</option>
              </select>
              <button id="todo-create-task" class="todo-public-btn primary" type="button">Add</button>
            </div>
            <input id="todo-create-note" type="text" maxlength="1000" placeholder="Note (optional)">
            <input id="todo-create-email" type="hidden">
            <div id="todo-create-status" class="todo-sponsor-status"></div>
          </div>
        </div>

        <div id="todo-public-list" class="todo-public-list tl"></div>
      </section>
    </section>
  </main>
  <script src="/public/js/itinerary-card.js"></script>
  <script src="/public/js/public-todo-share.js"></script>
</body>
</html>

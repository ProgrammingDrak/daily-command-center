<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Command Center — Account</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #1a1d2e;
      border: 1px solid #2d3148;
      border-radius: 12px;
      padding: 40px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.5);
    }

    .logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, #3b82f6, #6366f1);
      border-radius: 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      margin-bottom: 12px;
    }

    .logo h1 {
      font-size: 18px;
      font-weight: 600;
      color: #f1f5f9;
      letter-spacing: -0.01em;
    }

    .logo p {
      font-size: 13px;
      color: #64748b;
      margin-top: 4px;
    }

    .auth-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px;
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 8px;
      padding: 4px;
      margin-bottom: 20px;
    }

    .auth-tab {
      background: transparent;
      border: 0;
      border-radius: 6px;
      color: #64748b;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      padding: 8px 10px;
      transition: background 0.15s, color 0.15s;
    }

    .auth-tab.active {
      background: #2d3148;
      color: #f1f5f9;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group.hidden {
      display: none;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #94a3b8;
      margin-bottom: 6px;
      letter-spacing: 0.01em;
    }

    input {
      width: 100%;
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 14px;
      color: #e2e8f0;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
    }

    input::placeholder { color: #475569; }

    .password-wrapper {
      position: relative;
    }

    .password-wrapper input {
      padding-right: 42px;
    }

    .toggle-pw {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: #475569;
      padding: 0;
      display: flex;
      align-items: center;
      transition: color 0.15s;
    }

    .toggle-pw:hover { color: #94a3b8; }

    .btn {
      width: 100%;
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 11px 16px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.15s, transform 0.1s;
      letter-spacing: 0.01em;
    }

    .btn:hover { background: #2563eb; }
    .btn:active { transform: scale(0.99); }
    .btn:disabled { background: #334155; color: #64748b; cursor: not-allowed; transform: none; }

    .error {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      color: #fca5a5;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }

    .error.visible { display: block; }

    .clerk-mount { display: none; margin-bottom: 18px; }
    .clerk-mount.visible { display: block; }

    .divider {
      display: none;
      align-items: center;
      text-align: center;
      color: #64748b;
      font-size: 12px;
      margin: 4px 0 18px;
    }
    .divider.visible { display: flex; }
    .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: #2d3148; }
    .divider span { padding: 0 12px; }

    .fine-print {
      color: #64748b;
      font-size: 12px;
      line-height: 1.45;
      margin-top: 14px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">⚡</div>
      <h1>Daily Command Center</h1>
      <p id="authSubtitle">Sign in to continue</p>
    </div>

    <div class="error" id="error"></div>

    <div id="clerkSignIn" class="clerk-mount"></div>
    <div id="clerkDivider" class="divider"><span>or continue with a username</span></div>

    <div class="auth-tabs" role="tablist" aria-label="Account access">
      <button type="button" class="auth-tab active" id="loginTab" role="tab" aria-selected="true">Sign in</button>
      <button type="button" class="auth-tab" id="registerTab" role="tab" aria-selected="false">Register</button>
    </div>

    <form id="authForm">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="drake" autocomplete="username" autofocus>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <div class="password-wrapper">
          <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password">
          <button type="button" class="toggle-pw" id="togglePw" aria-label="Show password">
            <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="form-group hidden" id="confirmGroup">
        <label for="confirmPassword">Confirm password</label>
        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="••••••••" autocomplete="new-password">
      </div>
      <button type="submit" class="btn" id="submitBtn">Sign in</button>
      <p class="fine-print" id="authFinePrint">New here? Choose Register to create your workspace.</p>
    </form>
  </div>

  <script>
    let mode = window.location.pathname === "/register" ? "register" : "login";

    const loginTab = document.getElementById("loginTab");
    const registerTab = document.getElementById("registerTab");
    const subtitle = document.getElementById("authSubtitle");
    const confirmGroup = document.getElementById("confirmGroup");
    const confirmInput = document.getElementById("confirmPassword");
    const finePrint = document.getElementById("authFinePrint");
    const togglePw = document.getElementById("togglePw");
    const passwordInput = document.getElementById("password");
    const eyeIcon = document.getElementById("eyeIcon");
    const usernameInput = document.getElementById("username");

    function setMode(nextMode, pushState = true) {
      mode = nextMode;
      const isRegister = mode === "register";
      loginTab.classList.toggle("active", !isRegister);
      registerTab.classList.toggle("active", isRegister);
      loginTab.setAttribute("aria-selected", String(!isRegister));
      registerTab.setAttribute("aria-selected", String(isRegister));
      subtitle.textContent = isRegister ? "Create an account to continue" : "Sign in to continue";
      confirmGroup.classList.toggle("hidden", !isRegister);
      confirmInput.required = isRegister;
      passwordInput.autocomplete = isRegister ? "new-password" : "current-password";
      document.title = isRegister ? "Daily Command Center — Register" : "Daily Command Center — Sign In";
      btn.textContent = isRegister ? "Create Account" : "Sign in";
      finePrint.textContent = isRegister ? "Usernames use lowercase letters, numbers, hyphens, or underscores." : "New here? Choose Register to create your workspace.";
      errorEl.classList.remove("visible");
      if (pushState) {
        const params = window.location.search || "";
        window.history.replaceState(null, "", (isRegister ? "/register" : "/login") + params);
      }
    }

    togglePw.addEventListener("click", () => {
      const isHidden = passwordInput.type === "password";
      passwordInput.type = isHidden ? "text" : "password";
      eyeIcon.innerHTML = isHidden
        ? `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
           <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
           <line x1="1" y1="1" x2="23" y2="23"/>`
        : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
           <circle cx="12" cy="12" r="3"/>`;
    });

    const form = document.getElementById("authForm");
    const errorEl = document.getElementById("error");
    const btn = document.getElementById("submitBtn");

    loginTab.addEventListener("click", () => setMode("login"));
    registerTab.addEventListener("click", () => setMode("register"));

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errorEl.classList.remove("visible");
      btn.disabled = true;
      btn.textContent = mode === "register" ? "Creating account…" : "Signing in…";

      const rawUsername = usernameInput.value.trim();
      const username = mode === "register" ? rawUsername.toLowerCase() : rawUsername;
      const password = passwordInput.value;
      const confirmPassword = confirmInput.value;

      if (mode === "register" && password !== confirmPassword) {
        errorEl.textContent = "Passwords do not match.";
        errorEl.classList.add("visible");
        btn.disabled = false;
        btn.textContent = "Create Account";
        return;
      }

      if (mode === "register" && !/^[a-z0-9_-]{3,30}$/.test(username)) {
        errorEl.textContent = "Username must be 3-30 lowercase letters, numbers, hyphens, or underscores.";
        errorEl.classList.add("visible");
        btn.disabled = false;
        btn.textContent = "Create Account";
        return;
      }

      try {
        const res = await fetch(mode === "register" ? "/api/auth/register" : "/api/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password }),
          credentials: "include"
        });

        const data = await res.json();
        if (res.ok) {
          // Redirect to the app (or the originally requested page)
          const params = new URLSearchParams(window.location.search);
          window.location.href = params.get("next") || "/";
        } else {
          errorEl.textContent = data.error || (mode === "register" ? "Registration failed." : "Sign in failed. Check your credentials.");
          errorEl.classList.add("visible");
          btn.disabled = false;
          btn.textContent = mode === "register" ? "Create Account" : "Sign in";
        }
      } catch {
        errorEl.textContent = "Network error — is the server running?";
        errorEl.classList.add("visible");
        btn.disabled = false;
        btn.textContent = mode === "register" ? "Create Account" : "Sign in";
      }
    });

    setMode(mode, false);

    // ── Managed login widget (Clerk) ──
    // If CLERK_PUBLISHABLE_KEY is configured server-side, render the social
    // sign-in widget. If not, this is a no-op and the username/password form
    // remains the only path (graceful degradation).
    (async function initSocialLogin() {
      let cfg;
      try { cfg = await (await fetch("/api/auth/config")).json(); } catch { return; }
      const pk = cfg && cfg.clerkPublishableKey;
      if (!pk) return;

      // The Frontend API host is encoded in the publishable key:
      //   pk_test_<base64("<frontend-api-host>$")>
      // Loading clerk.browser.js from that host (with the data-* key attr) is
      // the canonical method and makes the dev-browser handshake work.
      let fapiHost;
      try { fapiHost = atob((pk.split("_")[2] || "")).replace(/\$+$/, ""); } catch { return; }
      if (!fapiHost) return;

      try {
        await new Promise((resolve, reject) => {
          const s = document.createElement("script");
          s.src = "https://" + fapiHost + "/npm/@clerk/clerk-js@5/dist/clerk.browser.js";
          s.async = true;
          s.crossOrigin = "anonymous";
          s.setAttribute("data-clerk-publishable-key", pk);
          s.onload = resolve;
          s.onerror = () => reject(new Error("Failed to load Clerk"));
          document.head.appendChild(s);
        });

        const clerk = window.Clerk;
        await clerk.load();

        let syncing = false;
        async function syncSession() {
          if (syncing) return;
          syncing = true;
          try {
            const token = await clerk.session.getToken();
            const res = await fetch("/api/auth/clerk-sync", {
              method: "POST",
              headers: { Authorization: "Bearer " + token },
              credentials: "include",
            });
            if (res.ok) {
              const params = new URLSearchParams(window.location.search);
              window.location.href = params.get("next") || "/";
            } else {
              const data = await res.json().catch(() => ({}));
              errorEl.textContent = data.error || "Sign-in could not be completed.";
              errorEl.classList.add("visible");
              syncing = false;
            }
          } catch {
            syncing = false;
          }
        }

        // Already signed in to Clerk (returning visitor) — sync straight through.
        if (clerk.user) { await syncSession(); return; }

        // Render Clerk's widget chrome-less so it sits inside our own .card as
        // a single, unified card (no card-in-a-card).
        const appearance = {
          variables: {
            colorBackground: "#1a1d2e",
            colorPrimary: "#3b82f6",
            colorText: "#e2e8f0",
            colorTextSecondary: "#94a3b8",
            colorInputBackground: "#0f1117",
            colorInputText: "#e2e8f0",
            colorNeutral: "#e2e8f0",
            borderRadius: "8px",
          },
          elements: {
            rootBox: { width: "100%" },
            cardBox: { boxShadow: "none", border: "none" },
            card: { boxShadow: "none", border: "none", backgroundColor: "transparent", padding: "0" },
          },
        };

        const mountEl = document.getElementById("clerkSignIn");
        // Return to /login after the OAuth round-trip so syncSession() runs and
        // mints our own dcc_session before navigating into the app.
        clerk.mountSignIn(mountEl, { appearance, forceRedirectUrl: "/login", signUpForceRedirectUrl: "/login" });
        mountEl.classList.add("visible");
        clerk.addListener(({ user }) => { if (user) syncSession(); });

        // Clerk now provides the primary title + card, so hide our duplicate
        // logo and collapse the legacy username/password form behind a toggle.
        document.querySelector(".logo").style.display = "none";
        const tabsEl = document.querySelector(".auth-tabs");
        const legacyForm = document.getElementById("authForm");
        tabsEl.style.display = "none";
        legacyForm.style.display = "none";
        const divider = document.getElementById("clerkDivider");
        divider.querySelector("span").textContent = "or sign in with a username";
        divider.classList.add("visible");
        divider.style.cursor = "pointer";
        divider.title = "Use a username and password instead";
        divider.addEventListener("click", () => {
          tabsEl.style.display = "";
          legacyForm.style.display = "";
          divider.style.cursor = "default";
          divider.querySelector("span").textContent = "or continue with a username";
          divider.replaceWith(divider.cloneNode(true)); // drop the listener
        });
      } catch (e) {
        console.warn("Social login unavailable:", e.message);
      }
    })();
  </script>
</body>
</html>

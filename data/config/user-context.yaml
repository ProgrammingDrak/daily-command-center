# --- Delivery ---
delivery: cowork
sentiment_analysis: true

# --- Triage rhythm ---
# 4 cycles per day: start-of-day (full), plus 3 incremental sweeps.
# Times are approximate -- scheduled tasks have the exact cron.
triage:
  cycles_per_day: 4
  escalation_thresholds:
    attention_after_cycles: 2    # "attention" after 2 sweep cycles with no response
    medium_after_cycles: 3       # "medium" after 3 cycles
    high_after_hours: 8          # "high" if open 8+ hours
    critical_after_hours: 24     # "critical" if open 24+ hours

# --- Schedule preferences ---
schedule:
  buffer_after_meetings_minutes: 15  # Free time after meetings
  min_task_block_minutes: 25         # Don't schedule tasks shorter than this
  max_task_chunk_minutes: 90         # Split longer tasks into chunks
  deep_work_preferred_slot: "morning"  # morning | afternoon
  replan_behavior: "lock_completed_drop_incomplete"
    # On replan: completed tasks stay, incomplete tasks go to couldn't-fit list.
    # Does NOT try to squeeze missed morning tasks into the afternoon.
  blocks:
    - name: "Morning Work"
      type: work
      start: "09:00"
      end: "12:00"
    - name: "Lunch"
      type: personal
      start: "12:00"
      end: "13:00"
    - name: "Afternoon Work"
      type: work
      start: "13:00"
      end: "17:30"
    - name: "Personal"
      type: personal
      start: "17:30"
      end: "21:00"

# --- Board cleanup ---
board_cleanup:
  done_threshold_days: 45       # Auto-archive completed tasks older than this
  backlog_threshold_days: 90    # Flag backlog items older than this (requires approval)
  auto_archive_backlog: false   # Never auto-archive backlog without user approval

# --- Knowledge manager ---
knowledge:
  daily_mode: "state_only"       # state_only | deep_scan
    # state_only: reads from day-state.json only (cheap, ~10-12K tokens)
    # deep_scan: also hits Slack/Gmail/Calendar (expensive, ~20-25K, manual only)
  promotion_stability_days: 14   # Days an entry must be stable before promotion
  promotion_min_references: 3    # Minimum session references before promotion
  demotion_inactive_days: 60     # Flag for demotion after this many days unused
  backup_retention_days: 7       # Keep last N days of knowledge file backups

# --- Stakeholder notifications ---
# When close-action-item runs, it notifies stakeholders via Slack.
# The draft is placed in the command center for user review before sending.
stakeholder_notifications:
  require_approval: true         # Always show draft in command center first
  auto_send: false               # Never auto-send without user approval

